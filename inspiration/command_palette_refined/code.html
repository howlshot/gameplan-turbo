<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;family=Geist+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-low": "#1b1b20",
            "on-surface": "#e4e1e9",

            "on-error": "#690005",

            "on-primary-fixed-variant": "#3e29bd",
            "inverse-primary": "#5647d5",
            "on-secondary-container": "#003023",
            "surface": "#131318",
            "tertiary-fixed-dim": "#ffb95d",
            "on-tertiary-fixed": "#2a1700",
            "tertiary-container": "#c98100",
            "surface-container-high": "#2a292f",
            "secondary-fixed": "#8af7cf",
            "surface-container-lowest": "#0e0e13",
            "on-primary-container": "#21008e",
            "on-secondary-fixed-variant": "#00513d",
            "outline-variant": "#474554",
            "primary": "#c5c0ff",
            "secondary": "#6edab4",
            "on-secondary": "#003829",
            "on-error-container": "#ffdad6",
            "background": "#131318",
            "on-primary": "#2600a1",
            "on-tertiary-container": "#3d2400",
            "on-tertiary": "#462a00",
            "inverse-surface": "#e4e1e9",
            "error-container": "#93000a",
            "tertiary": "#ffb95d",
            "surface-dim": "#131318",
            "error": "#ffb4ab",
            "on-tertiary-fixed-variant": "#653e00",
            "on-surface-variant": "#c8c4d7",
            "inverse-on-surface": "#303036",
            "on-secondary-fixed": "#002117",
            "surface-tint": "#c5c0ff",
            "on-primary-fixed": "#150067",
            "surface-variant": "#35343a",
            "primary-fixed-dim": "#c5c0ff",
            "primary-container": "#8b80ff",
            "tertiary-fixed": "#ffddb7",
            "surface-container-highest": "#35343a",
            "surface-container": "#1f1f25",
            "outline": "#928fa0",
            "secondary-fixed-dim": "#6edab4",
            "on-background": "#e4e1e9"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"],
            "label": ["Inter"],
            "mono": ["Geist Mono"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
    }
    .glass-effect {
      background: rgba(19, 19, 24, 0.7);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
    }
    .command-shadow {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(197, 192, 255, 0.05);
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(146, 143, 160, 0.2);
      border-radius: 2px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(146, 143, 160, 0.4);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary-container">
<!-- Main Dashboard Canvas (Blurred Background) -->
<div class="fixed inset-0 flex overflow-hidden">
<!-- SideNavBar (Predicted Anchor) -->
<aside class="h-screen w-64 fixed left-0 top-0 border-r border-[#c5c0ff]/5 bg-[#131318] flex flex-col py-6 z-10 opacity-40 grayscale">
<div class="px-6 mb-8 flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container" data-icon="rocket_launch">rocket_launch</span>
</div>
<span class="text-[#c5c0ff] font-headline font-bold uppercase tracking-widest text-xs">Project Alpha</span>
</div>
<nav class="flex-1 space-y-1">
<div class="px-6 py-2 bg-[#2a292f] text-[#c5c0ff] border-r-2 border-[#c5c0ff] flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
<span class="font-headline text-xs uppercase tracking-widest">Build</span>
</div>
<div class="px-6 py-2 text-slate-500 hover:text-slate-300 transition-colors flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-headline text-xs uppercase tracking-widest">Brief</span>
</div>
<div class="px-6 py-2 text-slate-500 hover:text-slate-300 transition-colors flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-headline text-xs uppercase tracking-widest">Research</span>
</div>
</nav>
</aside>
<!-- TopAppBar (Predicted Anchor) -->
<header class="sticky top-0 w-full z-20 bg-[#1b1b20]/60 backdrop-blur-xl border-b border-[#c5c0ff]/10 flex justify-between items-center px-6 py-3 opacity-40 grayscale ml-64">
<div class="flex items-center gap-8">
<span class="font-headline font-black tracking-tighter text-[#c5c0ff] text-2xl">Preflight</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-slate-400" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Dashboard Content Mockup (Blurred) -->
<main class="ml-64 flex-1 p-8 opacity-20 blur-sm">
<div class="grid grid-cols-3 gap-6">
<div class="col-span-2 h-96 bg-surface-container-low rounded-xl"></div>
<div class="h-96 bg-surface-container-low rounded-xl"></div>
<div class="h-64 bg-surface-container-low rounded-xl"></div>
<div class="h-64 bg-surface-container-low rounded-xl"></div>
<div class="h-64 bg-surface-container-low rounded-xl"></div>
</div>
</main>
</div>
<!-- Command Palette Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-start justify-center pt-[12vh] px-4 bg-surface-container-lowest/40 backdrop-blur-[2px]">
<!-- Command Palette Surface -->
<div class="w-full max-w-2xl overflow-hidden rounded-2xl border border-white/5 glass-effect command-shadow flex flex-col transition-all duration-300">
<!-- Search Input Section -->
<div class="relative flex items-center px-6 py-5 border-b border-white/5">
<span class="material-symbols-outlined text-primary/80 mr-4" data-icon="search" style="font-size: 24px;">search</span>
<input autofocus="" class="flex-1 bg-transparent border-none text-on-surface placeholder:text-outline/50 focus:ring-0 font-body text-lg tracking-tight" placeholder="Search projects, actions, or platforms..." type="text"/>
<div class="flex items-center gap-1.5 ml-4">
<kbd class="px-2 py-1 bg-white/5 rounded-md border border-white/10 text-[10px] font-mono text-outline uppercase tracking-tight">Esc</kbd>
</div>
</div>
<!-- Scrollable Results Group -->
<div class="max-h-[60vh] overflow-y-auto py-4 custom-scrollbar">
<!-- Group: Projects -->
<div class="px-3 pb-6">
<h3 class="px-4 py-2 text-[10px] font-headline font-bold uppercase tracking-[0.25em] text-outline/40">Projects</h3>
<div class="mt-1 space-y-1">
<button class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-primary/10 border border-transparent hover:border-primary/20 group transition-all duration-150 text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center border border-white/5 group-hover:border-primary/40 group-hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="architecture">architecture</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface group-hover:text-primary transition-colors">Project Alpha</p>
<p class="text-[10px] text-outline/60 font-mono mt-0.5">/vault/active/alpha-24</p>
</div>
</div>
<div class="flex items-center gap-2">
<span class="text-[10px] text-outline/40 font-mono opacity-0 group-hover:opacity-100 transition-all transform translate-x-2 group-hover:translate-x-0">Enter</span>
</div>
</button>
<button class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-primary/10 border border-transparent hover:border-primary/20 group transition-all duration-150 text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center border border-white/5 group-hover:border-primary/40 group-hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-outline/60 group-hover:text-primary transition-colors" data-icon="database">database</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface group-hover:text-primary transition-colors">Data Engine V2</p>
<p class="text-[10px] text-outline/60 font-mono mt-0.5">/archive/legacy-engine</p>
</div>
</div>
</button>
</div>
</div>
<!-- Group: Actions -->
<div class="px-3 pb-6">
<h3 class="px-4 py-2 text-[10px] font-headline font-bold uppercase tracking-[0.25em] text-outline/40">Actions</h3>
<div class="mt-1 space-y-1">
<button class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-primary/10 border border-transparent hover:border-primary/20 group transition-all duration-150">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary group-hover:text-primary transition-colors" data-icon="add_circle">add_circle</span>
<p class="text-sm font-medium text-on-surface group-hover:text-primary transition-colors">New Project</p>
</div>
<div class="flex items-center gap-1.5 opacity-40 group-hover:opacity-100 transition-opacity">
<kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 text-[10px] font-mono text-outline group-hover:text-primary group-hover:border-primary/30">⌘</kbd>
<kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 text-[10px] font-mono text-outline group-hover:text-primary group-hover:border-primary/30">N</kbd>
</div>
</button>
<button class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-primary/10 border border-transparent hover:border-primary/20 group transition-all duration-150">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline/60 group-hover:text-primary transition-colors" data-icon="folder_open">folder_open</span>
<p class="text-sm font-medium text-on-surface group-hover:text-primary transition-colors">Open Local Directory...</p>
</div>
<div class="flex items-center gap-1.5 opacity-40 group-hover:opacity-100 transition-opacity">
<kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 text-[10px] font-mono text-outline group-hover:text-primary group-hover:border-primary/30">⌘</kbd>
<kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 text-[10px] font-mono text-outline group-hover:text-primary group-hover:border-primary/30">O</kbd>
</div>
</button>
</div>
</div>
<!-- Group: Platforms -->
<div class="px-3 pb-6">
<h3 class="px-4 py-2 text-[10px] font-headline font-bold uppercase tracking-[0.25em] text-outline/40">Open Platform</h3>
<div class="grid grid-cols-2 gap-2 mt-1 px-1">
<button class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-primary/10 border border-white/5 hover:border-primary/20 transition-all group">
<div class="w-7 h-7 rounded-full bg-secondary/10 flex items-center justify-center overflow-hidden border border-secondary/20">
<span class="material-symbols-outlined text-secondary" data-icon="favorite" style="font-size: 14px;">favorite</span>
</div>
<p class="text-xs font-medium text-on-surface group-hover:text-primary">Lovable</p>
</button>
<button class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-primary/10 border border-white/5 hover:border-primary/20 transition-all group">
<div class="w-7 h-7 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden border border-primary/20">
<span class="material-symbols-outlined text-primary" data-icon="query_stats" style="font-size: 14px;">query_stats</span>
</div>
<p class="text-xs font-medium text-on-surface group-hover:text-primary">Perplexity</p>
</button>
<button class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-primary/10 border border-white/5 hover:border-primary/20 transition-all group">
<div class="w-7 h-7 rounded-full bg-tertiary/10 flex items-center justify-center overflow-hidden border border-tertiary/20">
<span class="material-symbols-outlined text-tertiary" data-icon="api" style="font-size: 14px;">api</span>
</div>
<p class="text-xs font-medium text-on-surface group-hover:text-primary">Anthropic Console</p>
</button>
<button class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-primary/10 border border-white/5 hover:border-primary/20 transition-all group">
<div class="w-7 h-7 rounded-full bg-white/5 flex items-center justify-center overflow-hidden border border-white/10">
<span class="material-symbols-outlined text-outline/60" data-icon="code" style="font-size: 14px;">code</span>
</div>
<p class="text-xs font-medium text-on-surface group-hover:text-primary">GitHub Copilot</p>
</button>
</div>
</div>
<!-- Group: Settings -->
<div class="px-3 border-t border-white/5 pt-4">
<div class="space-y-1">
<button class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-primary/10 border border-transparent hover:border-primary/20 group transition-all duration-150">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline/60 group-hover:text-primary transition-colors" data-icon="settings">settings</span>
<p class="text-sm font-medium text-on-surface group-hover:text-primary transition-colors">System Preferences</p>
</div>
<div class="flex items-center gap-1.5 opacity-40 group-hover:opacity-100 transition-opacity">
<kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 text-[10px] font-mono text-outline group-hover:text-primary group-hover:border-primary/30">⌘</kbd>
<kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 text-[10px] font-mono text-outline group-hover:text-primary group-hover:border-primary/30">,</kbd>
</div>
</button>
<button class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-primary/10 border border-transparent hover:border-primary/20 group transition-all duration-150">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline/60 group-hover:text-primary transition-colors" data-icon="help">help</span>
<p class="text-sm font-medium text-on-surface group-hover:text-primary transition-colors">Documentation &amp; Shortcuts</p>
</div>
<kbd class="px-2 py-0.5 rounded bg-white/5 border border-white/10 text-[10px] font-mono text-outline group-hover:text-primary group-hover:border-primary/30 opacity-40 group-hover:opacity-100">F1</kbd>
</button>
</div>
</div>
</div>
<!-- Footer Help Section -->
<div class="bg-black/20 px-6 py-4 border-t border-white/5 flex items-center justify-between">
<div class="flex items-center gap-8">
<div class="flex items-center gap-2.5">
<kbd class="px-1.5 py-0.5 bg-white/5 rounded text-[10px] font-mono text-outline/60 border border-white/10 shadow-sm">↑↓</kbd>
<span class="text-[10px] text-outline/40 font-semibold uppercase tracking-wider">Navigate</span>
</div>
<div class="flex items-center gap-2.5">
<kbd class="px-1.5 py-0.5 bg-white/5 rounded text-[10px] font-mono text-outline/60 border border-white/10 shadow-sm">↵</kbd>
<span class="text-[10px] text-outline/40 font-semibold uppercase tracking-wider">Select</span>
</div>
</div>
<div class="flex items-center gap-2 px-3 py-1 rounded-full bg-secondary/5 border border-secondary/10">
<span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span>
<span class="text-[10px] text-secondary/80 font-mono font-bold uppercase tracking-widest">System Operational</span>
</div>
</div>
</div>
</div>
<!-- Status HUD (Floating bottom bar) -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[110] px-6 py-2 rounded-full border border-outline-variant/20 glass-effect flex items-center gap-8 shadow-2xl opacity-40 blur-[1px]">
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-secondary"></span>
<span class="text-[10px] font-mono text-on-surface/60 uppercase tracking-widest">CPU: 12%</span>
</div>
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-primary"></span>
<span class="text-[10px] font-mono text-on-surface/60 uppercase tracking-widest">MEM: 2.4GB</span>
</div>
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-tertiary"></span>
<span class="text-[10px] font-mono text-on-surface/60 uppercase tracking-widest">LAT: 14ms</span>
</div>
</div>
</body></html>
