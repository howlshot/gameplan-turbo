<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      darkMode: "class",

        extend: {

            "surface-container-low": "#1b1b20",

            "surface": "#131318",
            "tertiary-fixed-dim": "#ffb95d",
            "on-tertiary-fixed": "#2a1700",
            "tertiary-container": "#c98100",
            "surface-container-high": "#2a292f",
            "secondary-fixed": "#8af7cf",
            "surface-container-lowest": "#0e0e13",
            "on-primary-container": "#21008e",
            "on-secondary-fixed-variant": "#00513d",
            "outline-variant": "#474554",
            "primary": "#c5c0ff",
            "secondary": "#6edab4",
            "on-secondary": "#003829",
            "on-error-container": "#ffdad6",
            "background": "#131318",
            "on-primary": "#2600a1",
            "on-tertiary-container": "#3d2400",

            "inverse-surface": "#e4e1e9",
            "error-container": "#93000a",
            "tertiary": "#ffb95d",

            "on-surface-variant": "#c8c4d7",

            "on-secondary-fixed": "#002117",
            "surface-tint": "#c5c0ff",
            "on-primary-fixed": "#150067",
            "surface-variant": "#35343a",
            "primary-fixed-dim": "#c5c0ff",
            "primary-container": "#8b80ff",
            "tertiary-fixed": "#ffddb7",
            "surface-container-highest": "#35343a",
            "surface-container": "#1f1f25",
            "outline": "#928fa0",
            "secondary-fixed-dim": "#6edab4",
            "on-background": "#e4e1e9"

          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"],
            "label": ["Inter"],
            "mono": ["Geist Mono"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
    }
    .glass-effect {
      background: rgba(27, 27, 32, 0.8);
      backdrop-filter: blur(16px);
    }
    .command-shadow {
      box-shadow: 0 0 50px rgba(197, 192, 255, 0.08);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary-container">
<!-- Main Dashboard Canvas (Blurred Background) -->
<div class="fixed inset-0 flex overflow-hidden">
<!-- SideNavBar (Predicted Anchor) -->
<aside class="h-screen w-64 fixed left-0 top-0 border-r border-[#c5c0ff]/5 bg-[#131318] flex flex-col py-6 z-10 opacity-40 grayscale">
<div class="px-6 mb-8 flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container" data-icon="rocket_launch">rocket_launch</span>
</div>
<span class="text-[#c5c0ff] font-headline font-bold uppercase tracking-widest text-xs">Project Alpha</span>
</div>
<nav class="flex-1 space-y-1">
<div class="px-6 py-2 bg-[#2a292f] text-[#c5c0ff] border-r-2 border-[#c5c0ff] flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
<span class="font-headline text-xs uppercase tracking-widest">Build</span>
</div>
<div class="px-6 py-2 text-slate-500 hover:text-slate-300 transition-colors flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-headline text-xs uppercase tracking-widest">Brief</span>
</div>
<div class="px-6 py-2 text-slate-500 hover:text-slate-300 transition-colors flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-headline text-xs uppercase tracking-widest">Research</span>
</div>
</nav>
</aside>
<!-- TopAppBar (Predicted Anchor) -->
<header class="sticky top-0 w-full z-20 bg-[#1b1b20]/60 backdrop-blur-xl border-b border-[#c5c0ff]/10 flex justify-between items-center px-6 py-3 opacity-40 grayscale ml-64">
<div class="flex items-center gap-8">
<span class="font-headline font-black tracking-tighter text-[#c5c0ff] text-2xl">Preflight</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-slate-400" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Dashboard Content Mockup (Blurred) -->
<main class="ml-64 flex-1 p-8 opacity-20 blur-sm">
<div class="grid grid-cols-3 gap-6">
<div class="col-span-2 h-96 bg-surface-container-low rounded-xl"></div>
<div class="h-96 bg-surface-container-low rounded-xl"></div>
<div class="h-64 bg-surface-container-low rounded-xl"></div>
<div class="h-64 bg-surface-container-low rounded-xl"></div>
<div class="h-64 bg-surface-container-low rounded-xl"></div>
</div>
</main>
</div>
<!-- Command Palette Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-start justify-center pt-[153px] px-4 bg-surface-container-lowest/80 backdrop-blur-sm">
<!-- Command Palette Surface -->
<div class="w-full max-w-2xl overflow-hidden rounded-xl border border-outline-variant/20 glass-effect command-shadow flex flex-col transition-all duration-300">
<!-- Search Input Section -->
<div class="relative flex items-center px-5 py-4 border-b border-outline-variant/10">
<span class="material-symbols-outlined text-primary mr-4" data-icon="search" style="font-size: 24px;">search</span>
<input autofocus="" class="flex-1 bg-transparent border-none text-on-surface placeholder:text-outline focus:ring-0 font-body text-lg" placeholder="Search projects, actions, or platforms..." type="text"/>
<div class="flex items-center gap-1.5 ml-4">
<kbd class="px-2 py-1 bg-surface-container-high rounded border border-outline-variant/30 text-[10px] font-mono text-outline uppercase tracking-tighter">Esc</kbd>
</div>
</div>
<!-- Scrollable Results Group -->
<div class="max-h-[614px] overflow-y-auto py-3 custom-scrollbar">
<!-- Group: Projects -->
<div class="px-3 pb-4">
<h3 class="px-3 py-2 text-[10px] font-headline font-bold uppercase tracking-[0.2em] text-outline">Projects</h3>
<div class="space-y-0.5">
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-surface-container-high group transition-all duration-200">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded bg-surface-container-low flex items-center justify-center border border-outline-variant/20 group-hover:border-primary/30">
<span class="material-symbols-outlined text-primary" data-icon="architecture">architecture</span>
</div>
<div class="text-left">
<p class="text-sm font-medium text-on-surface">Project Alpha</p>
<p class="text-[10px] text-outline font-mono">/vault/active/alpha-24</p>
</div>
</div>
<span class="text-[10px] text-outline font-mono opacity-0 group-hover:opacity-100 transition-opacity">Enter</span>
</button>
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-surface-container-high group transition-all duration-200">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded bg-surface-container-low flex items-center justify-center border border-outline-variant/20 group-hover:border-primary/30">
<span class="material-symbols-outlined text-outline" data-icon="database">database</span>
</div>
<div class="text-left">
<p class="text-sm font-medium text-on-surface">Data Engine V2</p>
<p class="text-[10px] text-outline font-mono">/archive/legacy-engine</p>
</div>
</div>
</button>
</div>
</div>
<!-- Group: Actions -->
<div class="px-3 pb-4">
<h3 class="px-3 py-2 text-[10px] font-headline font-bold uppercase tracking-[0.2em] text-outline">Actions</h3>
<div class="space-y-0.5">
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-primary-container group transition-all duration-200">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary group-hover:text-on-primary-container" data-icon="add_circle">add_circle</span>
<p class="text-sm font-medium text-on-surface group-hover:text-on-primary-container">New Project</p>
</div>
<div class="flex items-center gap-1 opacity-60 group-hover:opacity-100 group-hover:text-on-primary-container">
<kbd class="text-[10px] font-mono">⌘</kbd>
<kbd class="text-[10px] font-mono">N</kbd>
</div>
</button>
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-surface-container-high group transition-all duration-200">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary" data-icon="folder_open">folder_open</span>
<p class="text-sm font-medium text-on-surface">Open Local Directory...</p>
</div>
<div class="flex items-center gap-1 opacity-60">
<kbd class="text-[10px] font-mono">⌘</kbd>
<kbd class="text-[10px] font-mono">O</kbd>
</div>
</button>
</div>
</div>
<!-- Group: Platforms -->
<div class="px-3 pb-4">
<h3 class="px-3 py-2 text-[10px] font-headline font-bold uppercase tracking-[0.2em] text-outline">Open Platform</h3>
<div class="grid grid-cols-2 gap-1 px-1">
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-surface-container-high border border-transparent hover:border-outline-variant/30 transition-all">
<div class="w-6 h-6 rounded-full bg-surface-container-lowest flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-secondary" data-icon="favorite" style="font-size: 14px;">favorite</span>
</div>
<p class="text-xs font-medium text-on-surface">Lovable</p>
</button>
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-surface-container-high border border-transparent hover:border-outline-variant/30 transition-all">
<div class="w-6 h-6 rounded-full bg-surface-container-lowest flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary" data-icon="query_stats" style="font-size: 14px;">query_stats</span>
</div>
<p class="text-xs font-medium text-on-surface">Perplexity</p>
</button>
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-surface-container-high border border-transparent hover:border-outline-variant/30 transition-all">
<div class="w-6 h-6 rounded-full bg-surface-container-lowest flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-tertiary" data-icon="api" style="font-size: 14px;">api</span>
</div>
<p class="text-xs font-medium text-on-surface">Anthropic Console</p>
</button>
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-surface-container-high border border-transparent hover:border-outline-variant/30 transition-all">
<div class="w-6 h-6 rounded-full bg-surface-container-lowest flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-outline" data-icon="code" style="font-size: 14px;">code</span>
</div>
<p class="text-xs font-medium text-on-surface">GitHub Copilot</p>
</button>
</div>
</div>
<!-- Group: Settings -->
<div class="px-3 border-t border-outline-variant/5 pt-3">
<div class="space-y-0.5">
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-surface-container-high group transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary" data-icon="settings">settings</span>
<p class="text-sm font-medium text-on-surface">System Preferences</p>
</div>
<div class="flex items-center gap-1 opacity-60">
<kbd class="text-[10px] font-mono">⌘</kbd>
<kbd class="text-[10px] font-mono">,</kbd>
</div>
</button>
<button class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-surface-container-high group transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary" data-icon="help">help</span>
<p class="text-sm font-medium text-on-surface">Documentation &amp; Shortcuts</p>
</div>
<kbd class="text-[10px] font-mono opacity-60">F1</kbd>
</button>
</div>
</div>
</div>
<!-- Footer Help Section -->
<div class="bg-surface-container-lowest/50 px-5 py-3 border-t border-outline-variant/10 flex items-center justify-between">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2">
<kbd class="px-1.5 py-0.5 bg-surface-container-high rounded text-[9px] font-mono text-outline border border-outline-variant/30">↑↓</kbd>
<span class="text-[10px] text-outline font-medium uppercase tracking-wider">Navigate</span>
</div>
<div class="flex items-center gap-2">
<kbd class="px-1.5 py-0.5 bg-surface-container-high rounded text-[9px] font-mono text-outline border border-outline-variant/30">↵</kbd>
<span class="text-[10px] text-outline font-medium uppercase tracking-wider">Select</span>
</div>
</div>
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<span class="text-[10px] text-secondary font-mono uppercase tracking-wider">System: Operational</span>
</div>
</div>
</div>
</div>
<!-- Status HUD (Floating bottom bar) -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[110] px-6 py-2 rounded-full border border-outline-variant/20 glass-effect flex items-center gap-8 shadow-2xl opacity-40 blur-[1px]">
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-secondary"></span>
<span class="text-[10px] font-mono text-on-surface/60 uppercase tracking-widest">CPU: 12%</span>
</div>
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-primary"></span>
<span class="text-[10px] font-mono text-on-surface/60 uppercase tracking-widest">MEM: 2.4GB</span>
</div>
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-tertiary"></span>
<span class="text-[10px] font-mono text-on-surface/60 uppercase tracking-widest">LAT: 14ms</span>
</div>
</div>
</body></html>
